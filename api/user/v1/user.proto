syntax = "proto3";

package user_v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

option go_package = "github.com/WithSoull/SimpleProject/pkg/user/v1;user_v1";

service UserV1 {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Update(UpdateRequest) returns (google.protobuf.Empty);
  rpc UpdatePassword(UpdatePasswordRequest) returns (google.protobuf.Empty);
  rpc Delete(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc ValidateCredentials(ValidateCredentialsRequest) returns (ValidateCredentialsResponse);
}


message UserInfo {
  string name = 1;
  string email = 2;
}

message User {
  string id = 1;
  UserInfo user_info = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message CreateRequest {
  UserInfo user_info = 1;
  string password = 2;
  string password_confirm = 3;
}
message CreateResponse {
  string id = 1;
}

message GetRequest {
  string id = 1;
}
message GetResponse {
  User user = 1;
}

message UpdateRequest {
  google.protobuf.StringValue name = 1;
  google.protobuf.StringValue email = 2;
}

message UpdatePasswordRequest {
  string id = 1;
  string password = 2;
  string password_confirm = 3;
}

message ValidateCredentialsRequest {
  string email = 1;
  string password = 2;
}

message ValidateCredentialsResponse {
  bool valid = 1;
  string user_id = 2;
}
