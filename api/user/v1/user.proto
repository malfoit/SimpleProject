syntax = "proto3";

package user_v1;

option go_package = "github.com/WithSoull/SimpleProject/pkg/user/v1;user_v1";

service UserV1 {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
};

message CreateUserRequest {
  string email = 1;
  string name = 2;
  string password = 3;
  string password_confirm = 4;
};

message CreateUserResponse {
  string email = 1;
};
